naftiko: 1.0.0-alpha2
info:
  label: E2B Volume Content API
  description: 'E2B Volume Content API. Read and write files and directories inside a mounted volume using a
    short-lived JWT.'
  tags:
  - E2B
  - Volumes
  - Files
  - Filesystem
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    E2B_VOLUME_TOKEN: E2B_VOLUME_TOKEN
capability:
  consumes:
  - type: http
    namespace: volumes-content
    baseUri: https://api.e2b.app
    description: Read/write files and directories inside an E2B volume.
    resources:
    - name: volume-path
      path: /volumecontent/{volumeID}/path
      operations:
      - name: statpath
        method: GET
        description: E2B Stat Volume Path
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
    - name: volume-dir
      path: /volumecontent/{volumeID}/dir
      operations:
      - name: listdir
        method: GET
        description: E2B List Volume Directory
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
      - name: createdir
        method: POST
        description: E2B Create Volume Directory
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
    - name: volume-file
      path: /volumecontent/{volumeID}/file
      operations:
      - name: readfile
        method: GET
        description: E2B Read Volume File
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
      - name: writefile
        method: POST
        description: E2B Write Volume File
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
      - name: deletefile
        method: DELETE
        description: E2B Delete Volume File
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.E2B_VOLUME_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: volumes-content-mcp
    port: 9090
    transport: http
    description: MCP tools for reading and writing inside a mounted volume.
    tools:
    - name: e2b-list-dir
      description: E2B List Volume Directory
      hints:
        readOnly: true
      call: volumes-content.listdir
      with:
        volumeID: tools.volumeID
        path: tools.path
    - name: e2b-read-file
      description: E2B Read Volume File
      hints:
        readOnly: true
      call: volumes-content.readfile
      with:
        volumeID: tools.volumeID
        path: tools.path
    - name: e2b-write-file
      description: E2B Write Volume File
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: volumes-content.writefile
      with:
        volumeID: tools.volumeID
        path: tools.path
        body: tools.body
    - name: e2b-delete-file
      description: E2B Delete Volume File
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: volumes-content.deletefile
      with:
        volumeID: tools.volumeID
        path: tools.path
