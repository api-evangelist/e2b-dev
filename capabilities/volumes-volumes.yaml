naftiko: 1.0.0-alpha2
info:
  label: E2B Volume API — Volumes
  description: 'E2B Volume API — Volumes. Create, list, and delete persistent volumes attachable to sandboxes.'
  tags:
  - E2B
  - Volumes
  - Storage
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    E2B_API_KEY: E2B_API_KEY
capability:
  consumes:
  - type: http
    namespace: volumes-volumes
    baseUri: https://api.e2b.app
    description: Manage persistent volumes that survive across sandboxes.
    resources:
    - name: volumes
      path: /volumes
      operations:
      - name: listvolumes
        method: GET
        description: E2B List Volumes
      - name: createvolume
        method: POST
        description: E2B Create A Volume
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: volume
      path: /volumes/{volumeID}
      operations:
      - name: getvolume
        method: GET
        description: E2B Get A Volume
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
      - name: deletevolume
        method: DELETE
        description: E2B Delete A Volume
        inputParameters:
        - name: volumeID
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.E2B_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: volumes-volumes-mcp
    port: 9090
    transport: http
    description: MCP tools for managing persistent E2B volumes.
    tools:
    - name: e2b-list-volumes
      description: E2B List Volumes
      hints:
        readOnly: true
      call: volumes-volumes.listvolumes
    - name: e2b-create-volume
      description: E2B Create A Volume
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: volumes-volumes.createvolume
      with:
        body: tools.body
    - name: e2b-get-volume
      description: E2B Get A Volume
      hints:
        readOnly: true
      call: volumes-volumes.getvolume
      with:
        volumeID: tools.volumeID
    - name: e2b-delete-volume
      description: E2B Delete A Volume
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: volumes-volumes.deletevolume
      with:
        volumeID: tools.volumeID
