naftiko: 1.0.0-alpha2
info:
  label: E2B Template API — Builds
  description: 'E2B Template API — Builds. Track template build status and stream build logs.'
  tags:
  - E2B
  - Templates
  - Builds
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    E2B_API_KEY: E2B_API_KEY
capability:
  consumes:
  - type: http
    namespace: templates-builds
    baseUri: https://api.e2b.app
    description: Inspect template build status and build logs.
    resources:
    - name: build
      path: /templates/{templateID}/builds/{buildID}
      operations:
      - name: getbuild
        method: GET
        description: E2B Get A Template Build
        inputParameters:
        - name: templateID
          in: path
          type: string
          required: true
        - name: buildID
          in: path
          type: string
          required: true
    - name: build-status
      path: /templates/{templateID}/builds/{buildID}/status
      operations:
      - name: getbuildstatus
        method: POST
        description: E2B Update Template Build Status
        inputParameters:
        - name: templateID
          in: path
          type: string
          required: true
        - name: buildID
          in: path
          type: string
          required: true
    - name: build-logs
      path: /templates/{templateID}/builds/{buildID}/logs
      operations:
      - name: getbuildlogs
        method: GET
        description: E2B Get Template Build Logs
        inputParameters:
        - name: templateID
          in: path
          type: string
          required: true
        - name: buildID
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.E2B_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: templates-builds-mcp
    port: 9090
    transport: http
    description: MCP tools for inspecting template builds.
    tools:
    - name: e2b-get-build
      description: E2B Get A Template Build
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: templates-builds.getbuild
      with:
        templateID: tools.templateID
        buildID: tools.buildID
    - name: e2b-get-build-logs
      description: E2B Get Template Build Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: templates-builds.getbuildlogs
      with:
        templateID: tools.templateID
        buildID: tools.buildID
